<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" href="./images/favicon.png" />
    <link rel="apple-touch-icon" href="./images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZyvraSites -We Build Websites for Businesses & Help Them Grow Online. Specialist in Marketing & Web Development Solutions in Chennai, India." />
    <title>ZyvraSites| Digital Solutions & Marketing</title>
    <link rel="stylesheet" href="./assets/index.css">
    <!-- EmailJS SDK v4 -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
      (function() {
        // Initialize EmailJS with Public Key
        emailjs.init({
          publicKey: "9SybhA2da93ikIGXf",
        });

        // Global function to be called by the React app
        window.emailjsSendForm = function(form) {
          console.log("Form processing started...");
          const btn = form.querySelector('button[type="submit"]');
          const originalText = btn.innerText;
          
          btn.disabled = true;
          btn.innerText = "Sending...";

          emailjs.sendForm("service_3wy2uji", "template_du9ytqo", form)
            .then(() => {
              console.log("SUCCESS!");
              alert("Thank you! Your message has been sent successfully.");
              form.reset();
            }, (error) => {
              console.log("FAILED...", error);
              alert("FAILED... " + (error.text || JSON.stringify(error)));
            })
            .finally(() => {
              btn.disabled = false;
              btn.innerText = originalText;
            });
        };
      })();
    </script>
    <script type="module" src="./assets/index.js"></script>
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
